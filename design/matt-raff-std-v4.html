<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,600&family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
  :root{--green-deep:#0F4331;--persimmon:#F2603C;--violet:#8E7CC3;--sand:#A88C60;--bone:#F6EEDD;--ink:#0B2118;
    --pad:clamp(22px,6vw,90px);--display:"Fraunces",serif;--grotesque:"Bricolage Grotesque",sans-serif;--mono:"DM Mono",monospace;--body:"DM Sans",system-ui,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--green-deep);color:var(--bone);font-family:var(--body);font-weight:300;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .wrap{max-width:1180px;margin:0 auto;padding:0 var(--pad)}
  .hero{position:relative;overflow:hidden;padding:clamp(56px,11vw,90px) 0 clamp(44px,8vw,72px);
    background:linear-gradient(180deg,rgba(15,67,49,.3),rgba(15,67,49,.18) 40%,var(--green-deep)),
      radial-gradient(120% 80% at 88% 8%,rgba(242,96,60,.5),rgba(242,96,60,0) 55%),
      radial-gradient(85% 65% at 12% 14%,rgba(142,124,195,.34),rgba(142,124,195,0) 58%),
      radial-gradient(80% 60% at 96% 72%,rgba(168,140,96,.26),rgba(168,140,96,0) 60%),var(--green-deep)}
  .hero-grid{position:relative;z-index:2;display:grid;grid-template-columns:1fr;gap:clamp(46px,9vw,64px);align-items:center}
  .greet{font-family:var(--display);font-weight:400;font-size:clamp(1.45rem,5vw,1.9rem);color:var(--persimmon);margin-bottom:clamp(34px,8vw,52px);line-height:1.1}
  .announce .std{font-family:var(--grotesque);font-weight:800;letter-spacing:.18em;text-transform:uppercase;font-size:clamp(1.35rem,4.6vw,2.1rem);color:var(--sand);margin-bottom:clamp(8px,2vw,14px)}
  .announce .names{font-family:var(--display);font-weight:900;line-height:.8;letter-spacing:-.015em;padding-left:clamp(26px,8vw,46px)}
  .announce .names .l1,.announce .names .l2{display:block;font-size:clamp(5rem,22vw,10.6rem);color:var(--violet)}
  .announce .names .amp{font-style:italic;font-weight:600;color:var(--persimmon)}
  .announce .marry{font-family:var(--grotesque);font-weight:800;letter-spacing:.16em;text-transform:uppercase;font-size:clamp(1.05rem,3.7vw,1.6rem);color:var(--sand);margin-top:clamp(30px,6vw,40px);line-height:1.15}
  .hero-photo{width:100%;background:var(--sand);padding:clamp(8px,1.4vw,12px);border-radius:8px;box-shadow:0 30px 60px -24px rgba(0,0,0,.55)}
  .hero-photo img{display:block;width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:3px}
  @media(min-width:840px){.hero-grid{grid-template-columns:1.05fr .95fr;gap:clamp(54px,6vw,84px)}.hero-photo{max-width:430px;justify-self:end}.announce .names{padding-left:0}}

  .date-sec{background:var(--sand);color:var(--green-deep);padding:clamp(64px,10vw,120px) 0;text-align:center}
  .date-sec .k{font-family:var(--grotesque);font-weight:800;letter-spacing:.22em;text-transform:uppercase;font-size:clamp(1.35rem,4.6vw,2.1rem);color:var(--green-deep)}
  .bigdate{font-family:var(--display);font-weight:900;font-size:clamp(3.8rem,18vw,9rem);line-height:.9;letter-spacing:-.02em;margin:18px 0 10px;color:var(--green-deep)}
  .bigdate b{color:var(--violet)}
  .subdate{font-family:var(--display);font-weight:600;font-size:clamp(1.35rem,4vw,1.9rem);color:var(--green-deep)}
  .venue{font-family:var(--grotesque);font-weight:800;letter-spacing:.16em;text-transform:uppercase;font-size:clamp(1.05rem,3.7vw,1.6rem);color:var(--green-deep);margin-top:14px;line-height:1.4}
  footer{position:relative;overflow:hidden;background:var(--green-deep);text-align:center;padding:clamp(60px,10vw,96px) var(--pad)}
  footer::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(70% 80% at 8% 118%,rgba(242,96,60,.42),rgba(242,96,60,0) 60%),
      radial-gradient(60% 70% at 88% 135%,rgba(142,124,195,.4),rgba(142,124,195,0) 62%)}
  footer .fn{position:relative;font-family:var(--display);font-weight:900;font-size:clamp(1.9rem,8vw,3.5rem);color:var(--violet)}
  footer .fn em{font-style:italic;color:var(--persimmon)}
</style></head><body>
